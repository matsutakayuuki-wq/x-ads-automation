<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - X Ads Automation</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' style='stop-color:%230ea5e9'/><stop offset='100%25' style='stop-color:%236366f1'/></linearGradient></defs><rect width='100' height='100' rx='20' fill='%230a0a0e'/><text x='50' y='68' font-family='system-ui,sans-serif' font-size='60' font-weight='900' fill='url(%23g)' text-anchor='middle'>X</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body { background: #0a0a0e; }
        .input-field { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); transition: all 0.2s; }
        .input-field:focus { background: rgba(255,255,255,0.05); border-color: rgba(14,165,233,0.4); box-shadow: 0 0 0 3px rgba(14,165,233,0.1); }
    </style>
</head>
<body class="text-gray-300 min-h-screen flex items-center justify-center antialiased">
    <div class="w-full max-w-sm px-6" x-data="{ loading: false, error: '' }">
        <!-- Logo -->
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-2xl bg-sky-500/10 ring-1 ring-sky-500/20 mb-4">
                <span class="text-xl font-black bg-gradient-to-r from-sky-400 to-indigo-400 bg-clip-text text-transparent">X</span>
            </div>
            <h1 class="text-lg font-semibold text-white">X Ads Automation</h1>
            <p class="text-sm text-gray-500 mt-1">Sign in to your account</p>
        </div>

        <!-- Error -->
        <div x-show="error" x-cloak class="mb-5 px-4 py-3 rounded-xl bg-red-500/5 border border-red-500/10 text-red-400 text-[13px]">
            <span x-text="error"></span>
        </div>

        <!-- Form -->
        <form @submit.prevent="
            loading = true; error = '';
            fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email: $refs.email.value, password: $refs.password.value }),
                redirect: 'follow'
            }).then(r => {
                if (r.redirected) { window.location.href = r.url; return; }
                if (!r.ok) return r.json().then(d => { throw new Error(d.detail); });
                window.location.href = '/dashboard';
            }).catch(e => { error = e.message; loading = false; })
        " class="space-y-4">
            <div>
                <label class="block text-[11px] font-medium text-gray-500 uppercase tracking-wider mb-1.5">Email</label>
                <input x-ref="email" type="email" required autocomplete="email"
                    class="input-field w-full px-4 py-2.5 rounded-xl text-white text-sm placeholder-gray-600 focus:outline-none">
            </div>
            <div>
                <label class="block text-[11px] font-medium text-gray-500 uppercase tracking-wider mb-1.5">Password</label>
                <input x-ref="password" type="password" required autocomplete="current-password"
                    class="input-field w-full px-4 py-2.5 rounded-xl text-white text-sm placeholder-gray-600 focus:outline-none">
            </div>
            <button type="submit" :disabled="loading"
                class="w-full py-2.5 bg-sky-600 hover:bg-sky-500 disabled:opacity-40 text-white text-sm font-medium rounded-xl transition-all mt-2">
                <span x-show="!loading">Sign in</span>
                <span x-show="loading" class="flex items-center justify-center">
                    <svg class="animate-spin h-4 w-4 mr-2" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
                    Signing in...
                </span>
            </button>
        </form>

        <p class="text-center text-[13px] text-gray-600 mt-8">
            Don't have an account? <a href="/register" class="text-sky-400 hover:text-sky-300 transition-colors">Sign up</a>
        </p>
    </div>
</body>
</html>
