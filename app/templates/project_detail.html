{% extends "base.html" %}
{% block title %}{{ project.name }} - X Ads Automation{% endblock %}
{% block content %}
<div x-data="projectDetail()" class="space-y-6">
    <!-- Header -->
    <div class="flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <a href="/projects" class="text-gray-500 hover:text-white transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/></svg>
            </a>
            <div>
                <h1 class="text-xl font-semibold text-white">{{ project.name }}</h1>
                <p class="text-sm text-gray-500 mt-0.5">案件設定</p>
            </div>
        </div>
        <button @click="deleteProject()" class="px-3 py-1.5 text-xs text-red-400 hover:bg-red-500/10 rounded-lg transition-colors">案件を削除</button>
    </div>

    <!-- Basic Info -->
    <form @submit.prevent="saveProject()">
        <div class="glass rounded-2xl p-5 mb-4">
            <h2 class="text-sm font-semibold text-white mb-4">基本情報</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-[11px] font-medium text-gray-500 uppercase tracking-wider mb-1">案件名</label>
                    <input x-model="form.name" type="text" required class="input-field w-full px-3 py-2 rounded-xl text-sm text-white">
                </div>
                <div>
                    <label class="block text-[11px] font-medium text-gray-500 uppercase tracking-wider mb-1">API認証情報</label>
                    <select x-model="form.credential_id" @change="onCredentialChange()" class="input-field w-full px-3 py-2 rounded-xl text-sm text-white bg-transparent">
                        <option value="">-- 選択 --</option>
                        {% for cred in credentials %}
                        <option value="{{ cred.id }}" {% if project.credential_id == cred.id %}selected{% endif %}>{{ cred.name }} ({{ cred.ads_account_id }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-[11px] font-medium text-gray-500 uppercase tracking-wider mb-1">説明</label>
                    <input x-model="form.description" type="text" class="input-field w-full px-3 py-2 rounded-xl text-sm text-white placeholder-gray-600">
                </div>
            </div>
        </div>

        <!-- Payment & Tracking -->
        <div class="glass rounded-2xl p-5 mb-4">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-sm font-semibold text-white">支払い・トラッキング</h2>
                <button type="button" @click="syncFromApi()" :disabled="syncing" class="px-3 py-1.5 text-xs text-sky-400 hover:bg-sky-500/10 rounded-lg transition-colors">
                    <span x-show="!syncing">APIから同期</span>
                    <span x-show="syncing">同期中...</span>
                </button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-[11px] font-medium text-gray-500 uppercase tracking-wider mb-1">支払い方法ID</label>
                    <select x-model="form.funding_instrument_id" class="input-field w-full px-3 py-2 rounded-xl text-sm text-white bg-transparent">
                        <option value="">-- 選択 --</option>
                        <template x-for="fi in fundingInstruments" :key="fi.id">
                            <option :value="fi.id" x-text="fi.description || fi.id" :selected="fi.id === form.funding_instrument_id"></option>
                        </template>
                        {% if project.funding_instrument_id %}
                        <option value="{{ project.funding_instrument_id }}" selected>{{ project.funding_instrument_id }} (saved)</option>
                        {% endif %}
                    </select>
                    <p class="text-[10px] text-gray-600 mt-1">または手動入力:</p>
                    <input x-model="form.funding_instrument_id" type="text" class="input-field w-full px-3 py-2 rounded-xl text-sm text-white mt-1" placeholder="e.g. i77332156">
                </div>
                <div>
                    <label class="block text-[11px] font-medium text-gray-500 uppercase tracking-wider mb-1">コンバージョンタグID</label>
                    <select x-model="form.conversion_tag_id" class="input-field w-full px-3 py-2 rounded-xl text-sm text-white bg-transparent">
                        <option value="">-- 選択 --</option>
                        <template x-for="tag in conversionTags" :key="tag.id">
                            <option :value="tag.id" x-text="(tag.name || tag.type || '') + ' (' + tag.id + ')'" :selected="tag.id === form.conversion_tag_id"></option>
                        </template>
                        {% if project.conversion_tag_id %}
                        <option value="{{ project.conversion_tag_id }}" selected>{{ project.conversion_tag_id }} (saved)</option>
                        {% endif %}
                    </select>
                    <input x-model="form.conversion_tag_id" type="text" class="input-field w-full px-3 py-2 rounded-xl text-sm text-white mt-1" placeholder="e.g. i60451460">
                </div>
            </div>
        </div>

        <!-- Save Project -->
        <div class="flex justify-end mb-6">
            <button type="submit" :disabled="saving" class="px-6 py-2.5 bg-sky-600 hover:bg-sky-500 disabled:opacity-40 text-white text-[13px] font-medium rounded-xl transition-colors">
                <span x-show="!saving">基本情報を保存</span>
                <span x-show="saving">保存中...</span>
            </button>
        </div>
    </form>

    <!-- Audiences Section -->
    <div class="space-y-4">
        <div class="flex items-center justify-between">
            <h2 class="text-sm font-semibold text-white">オーディエンス設定</h2>
            <button @click="addAudience()" class="px-3 py-1.5 text-xs text-sky-400 hover:bg-sky-500/10 rounded-lg transition-colors flex items-center">
                <svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
                オーディエンス追加
            </button>
        </div>

        <template x-if="audiences.length === 0">
            <div class="glass rounded-2xl p-6 text-center">
                <p class="text-sm text-gray-500">オーディエンスがまだありません</p>
                <button @click="addAudience()" class="mt-3 px-4 py-2 bg-sky-600/10 text-sky-400 text-sm rounded-xl hover:bg-sky-600/20 transition-colors">最初のオーディエンスを作成</button>
            </div>
        </template>

        <template x-for="(aud, audIdx) in audiences" :key="aud.id">
            <div class="glass rounded-2xl p-5" :id="'audience-' + aud.id">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center space-x-3">
                        <h3 class="text-sm font-semibold text-white" x-text="aud.name"></h3>
                        <span class="badge" :class="aud.is_active ? 'bg-emerald-500/10 text-emerald-400' : 'bg-gray-500/10 text-gray-400'" x-text="aud.is_active ? '有効' : '無効'"></span>
                    </div>
                    <div class="flex space-x-2">
                        <button @click="aud._expanded = !aud._expanded" class="text-[10px] text-gray-400 hover:text-white transition-colors" x-text="aud._expanded ? '折りたたむ' : '展開'"></button>
                        <button @click="deleteAudience(aud.id, audIdx)" class="text-[10px] text-red-400 hover:text-red-300 transition-colors">削除</button>
                    </div>
                </div>

                <div x-show="aud._expanded" x-cloak>
                    <!-- Audience Name & Description -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-4">
                        <div>
                            <label class="block text-[10px] font-medium text-gray-500 uppercase tracking-wider mb-1">オーディエンス名</label>
                            <input x-model="aud.name" type="text" class="input-field w-full px-3 py-2 rounded-lg text-sm text-white">
                        </div>
                        <div>
                            <label class="block text-[10px] font-medium text-gray-500 uppercase tracking-wider mb-1">説明</label>
                            <input x-model="aud.description" type="text" class="input-field w-full px-3 py-2 rounded-lg text-sm text-white placeholder-gray-600" placeholder="メモ">
                        </div>
                    </div>

                    <!-- Targeting -->
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-4">
                        <div>
                            <label class="block text-[11px] font-medium text-gray-500 uppercase tracking-wider mb-1">目的</label>
                            <select x-model="aud.default_objective" class="input-field w-full px-3 py-2 rounded-xl text-sm text-white bg-transparent">
                                <option value="WEBSITE_CLICKS">ウェブサイトクリック</option>
                                <option value="WEBSITE_CONVERSIONS">ウェブサイトコンバージョン</option>
                                <option value="APP_INSTALLS">アプリインストール</option>
                                <option value="ENGAGEMENTS">エンゲージメント</option>
                                <option value="REACH">リーチ</option>
                                <option value="VIDEO_VIEWS">動画再生</option>
                                <option value="FOLLOWERS">フォロワー</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[11px] font-medium text-gray-500 uppercase tracking-wider mb-1">性別</label>
                            <select x-model="aud.default_gender" class="input-field w-full px-3 py-2 rounded-xl text-sm text-white bg-transparent">
                                <option value="">指定なし</option>
                                <option value="MALE">Male</option>
                                <option value="FEMALE">Female</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[11px] font-medium text-gray-500 uppercase tracking-wider mb-1">入札戦略</label>
                            <select x-model="aud.default_bid_strategy" class="input-field w-full px-3 py-2 rounded-xl text-sm text-white bg-transparent">
                                <option value="AUTO">自動入札</option>
                                <option value="TARGET">目標コスト</option>
                                <option value="MAX">上限入札</option>
                            </select>
                        </div>

                        <!-- Placements -->
                        <div>
                            <label class="block text-[11px] font-medium text-gray-500 uppercase tracking-wider mb-2">Placements</label>
                            <div class="flex flex-wrap gap-1.5">
                                <template x-for="opt in placementOptions" :key="opt.value">
                                    <label class="inline-flex items-center px-2.5 py-1.5 rounded-lg text-[11px] cursor-pointer transition-all select-none"
                                           :class="isChecked(aud, 'default_placements', opt.value) ? 'bg-purple-500/20 text-purple-300 border border-purple-500/40' : 'bg-white/[0.03] text-gray-500 border border-white/[0.06] hover:border-white/10'">
                                        <input type="checkbox" class="hidden"
                                               :checked="isChecked(aud, 'default_placements', opt.value)"
                                               @change="toggleJson(aud, 'default_placements', opt.value)">
                                        <span x-text="opt.label"></span>
                                    </label>
                                </template>
                            </div>
                        </div>

                        <!-- Platforms -->
                        <div>
                            <label class="block text-[11px] font-medium text-gray-500 uppercase tracking-wider mb-2">Platforms</label>
                            <div class="flex flex-wrap gap-1.5">
                                <template x-for="opt in platformOptions" :key="opt.value">
                                    <label class="inline-flex items-center px-2.5 py-1.5 rounded-lg text-[11px] cursor-pointer transition-all select-none"
                                           :class="isChecked(aud, 'default_platforms', opt.value) ? 'bg-sky-500/20 text-sky-300 border border-sky-500/40' : 'bg-white/[0.03] text-gray-500 border border-white/[0.06] hover:border-white/10'">
                                        <input type="checkbox" class="hidden"
                                               :checked="isChecked(aud, 'default_platforms', opt.value)"
                                               @change="toggleJson(aud, 'default_platforms', opt.value)">
                                        <span x-text="opt.label"></span>
                                    </label>
                                </template>
                            </div>
                        </div>

                        <!-- Languages -->
                        <div>
                            <label class="block text-[11px] font-medium text-gray-500 uppercase tracking-wider mb-2">Languages</label>
                            <div class="flex flex-wrap gap-1.5">
                                <template x-for="opt in languageOptions" :key="opt.value">
                                    <label class="inline-flex items-center px-2.5 py-1.5 rounded-lg text-[11px] cursor-pointer transition-all select-none"
                                           :class="isChecked(aud, 'default_languages', opt.value) ? 'bg-emerald-500/20 text-emerald-300 border border-emerald-500/40' : 'bg-white/[0.03] text-gray-500 border border-white/[0.06] hover:border-white/10'">
                                        <input type="checkbox" class="hidden"
                                               :checked="isChecked(aud, 'default_languages', opt.value)"
                                               @change="toggleJson(aud, 'default_languages', opt.value)">
                                        <span x-text="opt.label"></span>
                                    </label>
                                </template>
                            </div>
                        </div>

                        <!-- Age Ranges -->
                        <div>
                            <label class="block text-[11px] font-medium text-gray-500 uppercase tracking-wider mb-2">Age Ranges</label>
                            <div class="flex items-center gap-2">
                                <select :x-ref="'ageMin_' + aud.id" x-model="aud._ageMin" @change="onAgeMinChange(aud)" class="input-field px-3 py-2 rounded-xl text-sm text-white bg-transparent">
                                    <option value="">--</option>
                                    <option value="13">13</option>
                                    <option value="20">20</option>
                                    <option value="30">30</option>
                                    <option value="40">40</option>
                                </select>
                                <span class="text-gray-500 text-xs">〜</span>
                                <select x-model="aud._ageMax" @change="updateAgeRange(aud)" class="input-field px-3 py-2 rounded-xl text-sm text-white bg-transparent">
                                    <option value="">--</option>
                                    <template x-for="opt in (ageMaxByMin[aud._ageMin] || [])" :key="opt.value">
                                        <option :value="opt.value" x-text="opt.label"></option>
                                    </template>
                                </select>
                            </div>
                            <p class="text-[10px] text-gray-600 mt-1" x-show="aud._ageMin && aud._ageMax" x-text="'→ ' + (aud.default_age_ranges || '')"></p>
                        </div>

                        <!-- Locations -->
                        <div class="md:col-span-2 lg:col-span-3">
                            <label class="block text-[11px] font-medium text-gray-500 uppercase tracking-wider mb-2">Locations</label>
                            <div class="mb-2">
                                <label class="inline-flex items-center px-3 py-1.5 rounded-lg text-[12px] font-medium cursor-pointer transition-all select-none"
                                       :class="isChecked(aud, 'default_locations', '06ef846bfc783874') ? 'bg-rose-500/20 text-rose-300 border border-rose-500/40' : 'bg-white/[0.03] text-gray-500 border border-white/[0.06] hover:border-white/10'">
                                    <input type="checkbox" class="hidden"
                                           :checked="isChecked(aud, 'default_locations', '06ef846bfc783874')"
                                           @change="toggleJson(aud, 'default_locations', '06ef846bfc783874')">
                                    <span>日本（全国）</span>
                                </label>
                            </div>
                            <div class="flex flex-wrap gap-1.5">
                                <template x-for="opt in locationOptions" :key="opt.value">
                                    <label class="inline-flex items-center px-2.5 py-1.5 rounded-lg text-[11px] cursor-pointer transition-all select-none"
                                           :class="isChecked(aud, 'default_locations', opt.value) ? 'bg-rose-500/20 text-rose-300 border border-rose-500/40' : 'bg-white/[0.03] text-gray-500 border border-white/[0.06] hover:border-white/10'">
                                        <input type="checkbox" class="hidden"
                                               :checked="isChecked(aud, 'default_locations', opt.value)"
                                               @change="toggleJson(aud, 'default_locations', opt.value)">
                                        <span x-text="opt.label"></span>
                                    </label>
                                </template>
                            </div>
                        </div>

                        <div>
                            <label class="block text-[11px] font-medium text-gray-500 uppercase tracking-wider mb-1">オーディエンス拡張</label>
                            <select x-model="aud.default_audience_expansion" class="input-field w-full px-3 py-2 rounded-xl text-sm text-white bg-transparent">
                                <option value="">なし</option>
                                <option value="EXPANDED">拡張</option>
                                <option value="NARROW">限定</option>
                            </select>
                        </div>
                    </div>

                    <!-- Budget -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                        <div>
                            <label class="block text-[11px] font-medium text-gray-500 uppercase tracking-wider mb-1">日予算（JPY）</label>
                            <input x-model.number="aud.default_daily_budget" type="number" class="input-field w-full px-3 py-2 rounded-xl text-sm text-white" placeholder="5000">
                        </div>
                        <div>
                            <label class="block text-[11px] font-medium text-gray-500 uppercase tracking-wider mb-1">デフォルト入札額（JPY）</label>
                            <input x-model.number="aud.default_bid_amount" type="number" class="input-field w-full px-3 py-2 rounded-xl text-sm text-white" placeholder="180">
                        </div>
                        <div>
                            <label class="block text-[11px] font-medium text-gray-500 uppercase tracking-wider mb-1">通貨</label>
                            <select x-model="aud.currency" class="input-field w-full px-3 py-2 rounded-xl text-sm text-white bg-transparent">
                                <option value="JPY">JPY</option>
                                <option value="USD">USD</option>
                            </select>
                        </div>
                    </div>

                    <!-- Save Audience -->
                    <div class="flex justify-end">
                        <button type="button" @click="saveAudience(aud)" class="px-5 py-2 bg-sky-600 hover:bg-sky-500 text-white text-[12px] font-medium rounded-xl transition-colors">
                            オーディエンスを保存
                        </button>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <!-- LP Management -->
    <div class="glass rounded-2xl p-5">
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-sm font-semibold text-white">LP（ランディングページ）</h2>
            <a href="/lp" class="px-3 py-1.5 text-xs text-sky-400 hover:bg-sky-500/10 rounded-lg transition-colors flex items-center">
                <svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13.19 8.688a4.5 4.5 0 011.242 7.244l-4.5 4.5a4.5 4.5 0 01-6.364-6.364l1.757-1.757m9.86-2.854a4.5 4.5 0 00-6.364-6.364L4.5 8.25"/></svg>
                LP管理ページへ
            </a>
        </div>
        <template x-if="landingPages.length === 0">
            <p class="text-sm text-gray-600 text-center py-4">LPはまだ登録されていません。<a href="/lp" class="text-sky-400 hover:text-sky-300">LP管理ページ</a>から追加してください。</p>
        </template>
        <div class="space-y-2">
            <template x-for="lp in landingPages" :key="lp.id">
                <div class="flex items-center gap-3 px-3 py-2.5 rounded-xl border transition-all"
                     :class="lp.is_used ? 'bg-amber-500/[0.03] border-amber-500/10' : 'bg-white/[0.02] border-white/[0.04]'">
                    <div class="min-w-0 flex-1">
                        <div class="flex items-center space-x-2">
                            <span class="text-sm font-medium truncate" :class="lp.is_used ? 'text-gray-500 line-through' : 'text-white'" x-text="lp.name || '(名称なし)'"></span>
                            <span x-show="lp.is_used" class="badge bg-amber-500/10 text-amber-400 border border-amber-500/20 flex-shrink-0">使用済み</span>
                        </div>
                        <p class="text-[11px] truncate mt-0.5" :class="lp.is_used ? 'text-gray-600' : 'text-gray-500'" x-text="lp.url"></p>
                    </div>
                    <button @click="navigator.clipboard.writeText(lp.url); toast('URLをコピーしました')" class="text-[10px] text-sky-400 hover:text-sky-300 transition-colors flex-shrink-0">コピー</button>
                </div>
            </template>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function projectDetail() {
    return {
        saving: false,
        syncing: false,
        fundingInstruments: [],
        conversionTags: [],
        landingPages: [],
        audiences: [],

        // Options
        placementOptions: [
            { value: 'TIMELINES', label: 'タイムライン' },
            { value: 'PROFILES', label: 'プロフィール' },
            { value: 'SEARCH_RESULTS', label: '検索結果' },
            { value: 'REPLIES', label: '返信' },
            { value: 'MEDIA_VIEWER', label: 'メディアビューアー' },
        ],
        platformOptions: [
            { value: '0', label: 'iOS' },
            { value: '1', label: 'Android' },
            { value: '4', label: 'Desktop' },

            { value: 'ko', label: '韓国語' },
            { value: 'zh', label: '中文' },
            { value: 'es', label: 'Español' },
            { value: 'fr', label: 'Français' },
            { value: 'de', label: 'Deutsch' },
            { value: 'pt', label: 'Português' },
            { value: 'th', label: 'ไทย' },
            { value: 'vi', label: 'Tiếng Việt' },
        ],
        ageMaxByMin: {
            '13': [
                { value: '19', label: '19' },
                { value: '29', label: '29' },
                { value: '34', label: '34' },
                { value: '39', label: '39' },
            ],
            '20': [
                { value: '29', label: '29' },
                { value: '34', label: '34' },
                { value: '39', label: '39' },
                { value: '49', label: '49' },
                { value: 'above', label: '以上' },
            ],
            '30': [
                { value: '39', label: '39' },
                { value: '49', label: '49' },
                { value: 'above', label: '以上' },
            ],
            '40': [
                { value: '49', label: '49' },
                { value: 'above', label: '以上' },
            ],
        },
        _ageRangeMap: {
            '13_19': 'AGE_13_TO_19', '13_29': 'AGE_13_TO_29', '13_34': 'AGE_13_TO_34', '13_39': 'AGE_13_TO_39',
            '20_29': 'AGE_20_TO_29', '20_34': 'AGE_20_TO_34', '20_39': 'AGE_20_TO_39', '20_49': 'AGE_20_TO_49', '20_above': 'AGE_OVER_20',
            '30_39': 'AGE_30_TO_39', '30_49': 'AGE_30_TO_49', '30_above': 'AGE_OVER_30',
            '40_49': 'AGE_40_TO_49', '40_above': 'AGE_OVER_50',
        },
        locationOptions: [
            { value: '0b89db31d164a17d', label: '北海道' },
            { value: '1de05e90db6fde15', label: '青森県' },
            { value: '516fad81ed9abcc2', label: '岩手県' },
            { value: '1cff59592a4767e9', label: '宮城県' },
            { value: '975c45ff265eb77c', label: '秋田県' },
            { value: '4a9a5111024ffa58', label: '山形県' },
            { value: '5e921369a11e38d5', label: '福島県' },
            { value: 'cb7c6e9092251aa1', label: '茨城県' },
            { value: '9452db4fb01f0432', label: '栃木県' },

        form: {
            name: '{{ project.name }}',
            description: '{{ project.description or "" }}',
            credential_id: '{{ project.credential_id or "" }}',
            funding_instrument_id: '{{ project.funding_instrument_id or "" }}',
            conversion_tag_id: '{{ project.conversion_tag_id or "" }}',
        },

        async init() {
            await Promise.all([this.loadAudiences(), this.loadLandingPages()]);
        },

        async loadAudiences() {
            try {
                const raw = await api('/api/projects/{{ project.id }}/audiences');
                this.audiences = raw.map(a => {
                    a._expanded = true;
                    a._ageMin = '';
                    a._ageMax = '';
                    this.initAgeRange(a);
                    return a;
                });
            } catch {}
        },

        // JSON helpers (now per-audience)
        isChecked(aud, field, value) {
            const raw = aud[field];
            if (!raw) return false;
            try {
                const arr = typeof raw === 'string' ? JSON.parse(raw) : raw;
                return Array.isArray(arr) && arr.includes(value);
            } catch { return false; }
        },

        toggleJson(aud, field, value) {
            let arr = [];
            try {
                const raw = aud[field];
                arr = raw ? (typeof raw === 'string' ? JSON.parse(raw) : [...raw]) : [];
            } catch { arr = []; }
            const idx = arr.indexOf(value);
            if (idx >= 0) arr.splice(idx, 1);
            else arr.push(value);
            aud[field] = arr.length > 0 ? JSON.stringify(arr) : '';
        },

        // Age range helpers
        initAgeRange(aud) {
            const raw = aud.default_age_ranges;
            if (!raw) return;
            try {
                const arr = typeof raw === 'string' ? JSON.parse(raw) : raw;
                if (!Array.isArray(arr) || arr.length === 0) return;
                const val = arr[0];
                for (const [key, apiVal] of Object.entries(this._ageRangeMap)) {
                    if (apiVal === val) {
                        const [min, max] = key.split('_');
                        aud._ageMin = min;
                        aud._ageMax = max;
                        return;
                    }
                }
            } catch {}
        },

        onAgeMinChange(aud) {
            aud._ageMax = '';
            this.updateAgeRange(aud);
        },

        updateAgeRange(aud) {
            if (!aud._ageMin || !aud._ageMax) {
                aud.default_age_ranges = '';
                return;
            }
            const key = aud._ageMin + '_' + aud._ageMax;
            const apiVal = this._ageRangeMap[key];
            aud.default_age_ranges = apiVal ? JSON.stringify([apiVal]) : '';
        },

        // CRUD
        async saveProject() {
            this.saving = true;
            try {
                const data = { ...this.form };
                if (data.credential_id) data.credential_id = parseInt(data.credential_id);
                else data.credential_id = null;
                await api('/api/projects/{{ project.id }}', 'PUT', data);
                toast('保存しました');
            } catch (err) { toast(err.message, 'error'); }
            this.saving = false;
        },

        async addAudience() {
            try {
                const result = await api('/api/projects/{{ project.id }}/audiences', 'POST', { name: '新規オーディエンス' });
                result._expanded = true;
                result._ageMin = '';
                result._ageMax = '';
                this.audiences.push(result);
                toast('オーディエンスを追加しました');
            } catch (err) { toast(err.message, 'error'); }
        },

        async saveAudience(aud) {
            try {
                const data = { ...aud };
                delete data._expanded;
                delete data._ageMin;
                delete data._ageMax;
                delete data.id;
                delete data.project_id;
                delete data.created_at;
                delete data.updated_at;
                await api(`/api/audiences/${aud.id}`, 'PUT', data);
                toast(`「${aud.name}」を保存しました`);
            } catch (err) { toast(err.message, 'error'); }
        },

        async deleteAudience(id, idx) {
            if (!confirm('このオーディエンスを削除しますか？')) return;
            try {
                await api(`/api/audiences/${id}`, 'DELETE');
                this.audiences.splice(idx, 1);
                toast('削除しました');
            } catch (err) { toast(err.message, 'error'); }
        },

        async deleteProject() {
            if (!confirm('この案件を削除しますか？')) return;
            try {
                await api('/api/projects/{{ project.id }}', 'DELETE');
                toast('削除しました');
                setTimeout(() => location.href = '/projects', 500);
            } catch (err) { toast(err.message, 'error'); }
        },

        async syncFromApi() {
            if (!this.form.credential_id) { toast('先にAPI認証情報を選択してください', 'error'); return; }
            this.syncing = true;
            try {
                const [fiRes, tagRes] = await Promise.all([
                    api(`/api/credentials/${this.form.credential_id}/funding-instruments`),
                    api(`/api/credentials/${this.form.credential_id}/conversion-tags`),
                ]);
                if (fiRes.ok) this.fundingInstruments = fiRes.data || [];
                if (tagRes.ok) this.conversionTags = tagRes.data || [];
                toast('APIから同期しました');
            } catch (err) { toast(err.message, 'error'); }
            this.syncing = false;
        },
        onCredentialChange() {
            this.fundingInstruments = [];
            this.conversionTags = [];
        },

        async loadLandingPages() {
            try {
                this.landingPages = await api('/api/projects/{{ project.id }}/landing-pages');
            } catch {}
        },
    };
}
