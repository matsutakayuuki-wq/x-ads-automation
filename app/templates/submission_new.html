{% extends "base.html" %}
{% block title %}新規入稿 - X Ads Automation{% endblock %}
{% block content %}
<div x-data="submissionApp()" class="space-y-6">
    <!-- Header -->
    <div class="flex items-center justify-between">
        <div>
            <h1 class="text-xl font-semibold text-white">新規入稿</h1>
            <p class="text-sm text-gray-500 mt-1">広告キャンペーンの作成・入稿</p>
        </div>
    </div>

    <!-- Step 1: Project & Audience Selection -->
    <div class="glass rounded-2xl p-5">
        <h2 class="text-sm font-semibold text-white mb-3">1. 案件・オーディエンスを選択</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div>
                <label class="block text-[10px] font-medium text-gray-500 uppercase tracking-wider mb-1">案件</label>
                <select x-model="projectId" @change="loadProjectDefaults()" class="input-field w-full px-3 py-2.5 rounded-xl text-sm text-white bg-transparent">
                    <option value="">-- 案件を選択 --</option>
                    {% for p in projects %}
                    <option value="{{ p.id }}">{{ p.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-[10px] font-medium text-gray-500 uppercase tracking-wider mb-1">オーディエンス</label>
                <select x-model="audienceId" @change="applyAudienceDefaults()" class="input-field w-full px-3 py-2.5 rounded-xl text-sm text-white bg-transparent" :disabled="!projectId">
                    <option value="">-- オーディエンス選択（任意）--</option>
                    <template x-for="aud in projectAudiences" :key="aud.id">
                        <option :value="aud.id" x-text="aud.name"></option>
                    </template>
                </select>
            </div>
            <div>
                <label class="block text-[10px] font-medium text-gray-500 uppercase tracking-wider mb-1">バッチ名</label>
                <input x-model="batchName" type="text" placeholder="例: 3月LPキャンペーン" class="input-field w-full px-3 py-2.5 rounded-xl text-sm text-white placeholder-gray-600">
            </div>
        </div>
    </div>

    <!-- Step 2: Campaigns -->
    <div x-show="projectId" x-cloak>
        <div class="flex items-center justify-between mb-3">
            <h2 class="text-sm font-semibold text-white">2. キャンペーン詳細</h2>
            <div class="flex space-x-2 items-center">
                <button @click="addCampaign()" class="px-3 py-1.5 text-xs text-sky-400 hover:bg-sky-500/10 rounded-lg transition-colors flex items-center">
                    <svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
                    キャンペーン追加
                </button>
                <div class="relative" x-data="{ copyOpen: false }">
                    <button @click="copyOpen = !copyOpen" class="px-3 py-1.5 text-xs text-amber-400 hover:bg-amber-500/10 rounded-lg transition-colors flex items-center">
                        <svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 01-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 011.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 00-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 01-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 00-3.375-3.375h-1.5a1.125 1.125 0 01-1.125-1.125v-1.5a3.375 3.375 0 00-3.375-3.375H9.75"/></svg>
                        コピーして追加
                    </button>
                    <div x-show="copyOpen" @click.away="copyOpen = false" x-cloak
                         class="absolute right-0 mt-1 w-56 py-1 rounded-xl bg-[#1a1a1f] border border-white/[0.08] shadow-xl z-10">
                        <p class="px-3 py-1.5 text-[10px] text-gray-500 uppercase tracking-wider">コピー元を選択</p>
                        <template x-for="(c, idx) in campaigns" :key="idx">
                            <button @click="duplicateCampaign(idx); copyOpen = false; toast('キャンペーン #' + (idx+1) + ' をコピーしました')"
                                    class="w-full text-left px-3 py-2 text-xs text-gray-300 hover:bg-white/[0.05] transition-colors truncate">
                                #<span x-text="idx + 1"></span>: <span x-text="c.campaign_name || '(名称未設定)'" class="text-white"></span>
                            </button>
                        </template>
                    </div>
                </div>
            </div>
        </div>

        <template x-for="(c, idx) in campaigns" :key="idx">
            <div class="glass rounded-2xl p-5 mb-4">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider">
                        キャンペーン #<span x-text="idx + 1"></span>
                    </h3>
                    <div class="flex space-x-2">
                        <button @click="duplicateCampaign(idx)" class="text-[10px] text-gray-500 hover:text-sky-400 transition-colors">複製</button>
                        <button x-show="campaigns.length > 1" @click="removeCampaign(idx)" class="text-[10px] text-gray-500 hover:text-red-400 transition-colors">削除</button>
                    </div>
                </div>

                <!-- Campaign Settings -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3 mb-4">
                    <div>
                        <label class="block text-[10px] font-medium text-gray-500 uppercase tracking-wider mb-1">キャンペーン名 *</label>
                        <input x-model="c.campaign_name" type="text" required placeholder="LP001" class="input-field w-full px-3 py-2 rounded-lg text-sm text-white placeholder-gray-600">
                    </div>
                    <div>
                        <label class="block text-[10px] font-medium text-gray-500 uppercase tracking-wider mb-1">日予算（JPY）</label>
                        <input x-model.number="c.campaign_daily_budget" type="number" placeholder="5000" class="input-field w-full px-3 py-2 rounded-lg text-sm text-white placeholder-gray-600">
                    </div>
                    <div>
                        <label class="block text-[10px] font-medium text-gray-500 uppercase tracking-wider mb-1">入札額（JPY）</label>
                        <input x-model.number="c.bid_amount" type="number" placeholder="180" class="input-field w-full px-3 py-2 rounded-lg text-sm text-white placeholder-gray-600">
                    </div>
                </div>

                <!-- Ad Group Settings -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3 mb-4">
                    <div>
                        <label class="block text-[10px] font-medium text-gray-500 uppercase tracking-wider mb-1">広告グループ名</label>
                        <input x-model="c.line_item_name" type="text" placeholder="キャンペーン名と同じ" class="input-field w-full px-3 py-2 rounded-lg text-sm text-white placeholder-gray-600">
                    </div>
                    <div>
                        <label class="block text-[10px] font-medium text-gray-500 uppercase tracking-wider mb-1">目的</label>
                        <select x-model="c.campaign_objective" class="input-field w-full px-3 py-2 rounded-lg text-sm text-white bg-transparent">
                            <option value="WEBSITE_CLICKS">Website Clicks</option>
                            <option value="WEBSITE_CONVERSIONS">Website Conversions</option>
                            <option value="APP_INSTALLS">App Installs</option>
                            <option value="ENGAGEMENTS">Engagements</option>
                            <option value="REACH">Reach</option>
                            <option value="VIDEO_VIEWS">Video Views</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-medium text-gray-500 uppercase tracking-wider mb-1">入札戦略</label>
                        <select x-model="c.bid_strategy" class="input-field w-full px-3 py-2 rounded-lg text-sm text-white bg-transparent">
                            <option value="AUTO">自動入札</option>
                            <option value="TARGET">目標コスト</option>
                            <option value="MAX">上限入札</option>
                        </select>
                    </div>
                </div>

                <!-- Schedule -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-4">
                    <div>
                        <label class="block text-[10px] font-medium text-gray-500 uppercase tracking-wider mb-1">開始日時</label>
                        <input x-model="c.start_time" type="datetime-local" class="input-field w-full px-3 py-2 rounded-lg text-sm text-white">
                        <p class="text-[10px] text-gray-600 mt-0.5">空欄 = 即時開始</p>
                    </div>
                    <div>
                        <label class="block text-[10px] font-medium text-gray-500 uppercase tracking-wider mb-1">終了日時</label>
                        <input x-model="c.end_time" type="datetime-local" class="input-field w-full px-3 py-2 rounded-lg text-sm text-white">
                        <p class="text-[10px] text-gray-600 mt-0.5">空欄 = 終了日なし</p>
                    </div>
                </div>

                <!-- Targeting (collapsible) -->
                <details class="mb-4">
                    <summary class="text-[10px] font-medium text-gray-500 uppercase tracking-wider cursor-pointer hover:text-gray-300 transition-colors">ターゲティング（クリックで展開）</summary>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mt-3">
                        <!-- 性別 -->
                        <div>
                            <label class="block text-[10px] font-medium text-gray-500 uppercase tracking-wider mb-1">性別</label>
                            <select x-model="c.target_gender" class="input-field w-full px-3 py-2 rounded-lg text-sm text-white bg-transparent">
                                <option value="">指定なし</option>
                                <option value="MALE">Male</option>
                                <option value="FEMALE">Female</option>
                            </select>
                        </div>

                        <!-- Placements -->
                        <div>
                            <label class="block text-[10px] font-medium text-gray-500 uppercase tracking-wider mb-2">Placements</label>
                            <div class="flex flex-wrap gap-1.5">
                                <template x-for="opt in _placementOpts" :key="opt.value">
                                    <label class="inline-flex items-center px-2.5 py-1.5 rounded-lg text-[11px] cursor-pointer transition-all select-none"
                                           :class="isCampaignJsonChecked(c, 'placements', opt.value) ? 'bg-purple-500/20 text-purple-300 border border-purple-500/40' : 'bg-white/[0.03] text-gray-500 border border-white/[0.06] hover:border-white/10'">
                                        <input type="checkbox" class="hidden"
                                               :checked="isCampaignJsonChecked(c, 'placements', opt.value)"
                                               @change="toggleCampaignJson(c, 'placements', opt.value)">
                                        <span x-text="opt.label"></span>
                                    </label>
                                </template>
                            </div>
                        </div>

                        <!-- Platforms -->
                        <div>
                            <label class="block text-[10px] font-medium text-gray-500 uppercase tracking-wider mb-2">Platforms</label>
                            <div class="flex flex-wrap gap-1.5">
                                <template x-for="opt in _platformOpts" :key="opt.value">
                                    <label class="inline-flex items-center px-2.5 py-1.5 rounded-lg text-[11px] cursor-pointer transition-all select-none"
                                           :class="isCampaignJsonChecked(c, 'target_platforms', opt.value) ? 'bg-sky-500/20 text-sky-300 border border-sky-500/40' : 'bg-white/[0.03] text-gray-500 border border-white/[0.06] hover:border-white/10'">
                                        <input type="checkbox" class="hidden"
                                               :checked="isCampaignJsonChecked(c, 'target_platforms', opt.value)"
                                               @change="toggleCampaignJson(c, 'target_platforms', opt.value)">
                                        <span x-text="opt.label"></span>
                                    </label>
                                </template>
                            </div>
                        </div>

                        <!-- Languages -->
                        <div>
                            <label class="block text-[10px] font-medium text-gray-500 uppercase tracking-wider mb-2">Languages</label>
                            <div class="flex flex-wrap gap-1.5">
                                <template x-for="opt in _languageOpts" :key="opt.value">
                                    <label class="inline-flex items-center px-2.5 py-1.5 rounded-lg text-[11px] cursor-pointer transition-all select-none"
                                           :class="isCampaignJsonChecked(c, 'target_languages', opt.value) ? 'bg-emerald-500/20 text-emerald-300 border border-emerald-500/40' : 'bg-white/[0.03] text-gray-500 border border-white/[0.06] hover:border-white/10'">
                                        <input type="checkbox" class="hidden"
                                               :checked="isCampaignJsonChecked(c, 'target_languages', opt.value)"
                                               @change="toggleCampaignJson(c, 'target_languages', opt.value)">
                                        <span x-text="opt.label"></span>
                                    </label>
                                </template>
                            </div>
                        </div>

                        <!-- Age Ranges -->
                        <div>
                            <label class="block text-[10px] font-medium text-gray-500 uppercase tracking-wider mb-2">Age Ranges</label>
                            <div class="flex items-center gap-2">
                                <select x-model="c._ageMin" @change="c._ageMax = ''; updateCampaignAge(c)" class="input-field px-3 py-2 rounded-xl text-sm text-white bg-transparent">
                                    <option value="">--</option>
                                    <option value="13">13</option>
                                    <option value="20">20</option>
                                    <option value="30">30</option>
                                    <option value="40">40</option>
                                </select>
                                <span class="text-gray-500 text-xs">〜</span>
                                <select x-model="c._ageMax" @change="updateCampaignAge(c)" class="input-field px-3 py-2 rounded-xl text-sm text-white bg-transparent">
                                    <option value="">--</option>
                                    <template x-for="opt in (_ageMaxByMin[c._ageMin] || [])" :key="opt.value">
                                        <option :value="opt.value" x-text="opt.label"></option>
                                    </template>
                                </select>
                            </div>
                            <p class="text-[10px] text-gray-600 mt-1" x-show="c._ageMin && c._ageMax" x-text="'→ ' + (c.target_age_ranges || '')"></p>
                        </div>

                        <!-- Locations -->
                        <div class="md:col-span-2 lg:col-span-3">
                            <label class="block text-[10px] font-medium text-gray-500 uppercase tracking-wider mb-2">Locations</label>
                            <div class="mb-2">
                                <label class="inline-flex items-center px-3 py-1.5 rounded-lg text-[12px] font-medium cursor-pointer transition-all select-none"
                                       :class="isCampaignJsonChecked(c, 'target_locations', '06ef846bfc783874') ? 'bg-rose-500/20 text-rose-300 border border-rose-500/40' : 'bg-white/[0.03] text-gray-500 border border-white/[0.06] hover:border-white/10'">
                                    <input type="checkbox" class="hidden"
                                           :checked="isCampaignJsonChecked(c, 'target_locations', '06ef846bfc783874')"
                                           @change="toggleCampaignJson(c, 'target_locations', '06ef846bfc783874')">
                                    <span>日本（全国）</span>
                                </label>
                            </div>
                            <div class="flex flex-wrap gap-1.5">
                                <template x-for="opt in _locationOpts" :key="opt.value">
                                    <label class="inline-flex items-center px-2.5 py-1.5 rounded-lg text-[11px] cursor-pointer transition-all select-none"
                                           :class="isCampaignJsonChecked(c, 'target_locations', opt.value) ? 'bg-rose-500/20 text-rose-300 border border-rose-500/40' : 'bg-white/[0.03] text-gray-500 border border-white/[0.06] hover:border-white/10'">
                                        <input type="checkbox" class="hidden"
                                               :checked="isCampaignJsonChecked(c, 'target_locations', opt.value)"
                                               @change="toggleCampaignJson(c, 'target_locations', opt.value)">
                                        <span x-text="opt.label"></span>
                                    </label>
                                </template>
                            </div>
                        </div>

                        <!-- オーディエンス拡張 -->
                        <div>
                            <label class="block text-[10px] font-medium text-gray-500 uppercase tracking-wider mb-1">オーディエンス拡張</label>
                            <select x-model="c.audience_expansion" class="input-field w-full px-3 py-2 rounded-lg text-sm text-white bg-transparent">
                                <option value="">なし</option>
                                <option value="EXPANDED">拡張</option>
                                <option value="NARROW">限定</option>
                            </select>
                        </div>
                    </div>
                </details>

                <!-- Tweet / Post Section -->
                <div class="border-t border-white/[0.06] pt-4">
                    <!-- Mode tabs -->
                    <div class="flex items-center space-x-1 mb-3">
                        <button @click="c._postMode = 'compose'" class="px-3 py-1.5 text-[11px] font-medium rounded-lg transition-colors"
                                :class="(c._postMode || 'compose') === 'compose' ? 'bg-sky-600/20 text-sky-400' : 'text-gray-500 hover:text-gray-300'">
                            新規ポスト作成
                        </button>
                        <button @click="c._postMode = 'existing'" class="px-3 py-1.5 text-[11px] font-medium rounded-lg transition-colors"
                                :class="c._postMode === 'existing' ? 'bg-sky-600/20 text-sky-400' : 'text-gray-500 hover:text-gray-300'">
                            既存ツイートID
                        </button>
                        <div class="flex-1"></div>
                        <button @click="showLpSidebar = true" x-show="landingPages.length > 0" class="px-3 py-1.5 text-[11px] font-medium text-emerald-400 hover:bg-emerald-600/10 rounded-lg transition-colors flex items-center">
                            <svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13.19 8.688a4.5 4.5 0 011.242 7.244l-4.5 4.5a4.5 4.5 0 01-6.364-6.364l1.757-1.757m9.86-2.854a4.5 4.5 0 00-6.364-6.364L4.5 8.25"/></svg>
                            LP一覧
                            <span x-show="availableLps.length > 0" class="ml-1 px-1.5 py-0.5 text-[9px] bg-emerald-500/20 text-emerald-400 rounded-full" x-text="availableLps.length"></span>
                        </button>
                    </div>

                    <!-- Compose mode -->
                    <div x-show="(c._postMode || 'compose') === 'compose'">
                        <!-- Tweet text -->
                        <div class="mb-3">
                            <label class="block text-[10px] font-medium text-gray-500 uppercase tracking-wider mb-1">投稿文</label>
                            <div class="relative">
                                <textarea x-model="c.tweet_text" rows="3" placeholder="広告ポストのテキストを入力..." class="input-field w-full px-3 py-2 rounded-lg text-sm text-white placeholder-gray-600 resize-none"></textarea>
                                <span class="absolute bottom-2 right-2 text-[10px]"
                                      :class="(c.tweet_text || '').length > 280 ? 'text-red-400' : 'text-gray-600'"
                                      x-text="(c.tweet_text || '').length + '/280'"></span>
                            </div>
                        </div>

                        <!-- Media selector -->
                        <div class="mb-3">
                            <label class="block text-[10px] font-medium text-gray-500 uppercase tracking-wider mb-1">メディア</label>
                            <!-- Selected media preview -->
                            <div x-show="c._selectedMedia && c._selectedMedia.length > 0" class="flex flex-wrap gap-2 mb-2">
                                <template x-for="(m, mi) in (c._selectedMedia || [])" :key="m.id">
                                    <div class="relative w-20 h-20 rounded-lg overflow-hidden group">
                                        <img x-show="m.mime_type.startsWith('image/')" :src="'/api/media/' + m.id + '/file'" class="w-full h-full object-cover">
                                        <div x-show="m.mime_type.startsWith('video/')" class="w-full h-full bg-gray-800 flex items-center justify-center">
                                            <svg class="w-6 h-6 text-white/50" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                                        </div>
                                        <button @click="c._selectedMedia.splice(mi, 1)" class="absolute top-0.5 right-0.5 w-5 h-5 rounded-full bg-black/70 text-red-400 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                            <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                                        </button>
                                    </div>
                                </template>
                            </div>
                            <button @click="c._showMediaPicker = !c._showMediaPicker" class="px-3 py-1.5 text-[11px] text-gray-400 hover:text-white border border-dashed border-white/10 hover:border-white/20 rounded-lg transition-colors flex items-center">
                                <svg class="w-3.5 h-3.5 mr-1.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909M3.75 21h16.5A2.25 2.25 0 0022.5 18.75V5.25A2.25 2.25 0 0020.25 3H3.75A2.25 2.25 0 001.5 5.25v13.5A2.25 2.25 0 003.75 21z"/></svg>
                                メディアを選択
                            </button>
                            <p class="text-[10px] text-gray-600 mt-1">最大4枚の画像、または1本の動画</p>

                            <!-- Media picker -->
                            <div x-show="c._showMediaPicker" x-cloak class="mt-2 p-3 rounded-xl bg-white/[0.02] border border-white/[0.06]">
                                <div x-show="mediaAssets.length === 0" class="text-center py-4">
                                    <p class="text-xs text-gray-500">メディアがありません</p>
                                    <a href="/media" class="text-xs text-sky-400 hover:text-sky-300 mt-1 inline-block">メディアをアップロード</a>
                                </div>
                                <div class="grid grid-cols-6 sm:grid-cols-8 gap-1.5">
                                    <template x-for="asset in mediaAssets" :key="asset.id">
                                        <div @click="toggleMedia(c, asset)" class="relative aspect-square rounded-lg overflow-hidden cursor-pointer ring-2 transition-all"
                                             :class="isMediaSelected(c, asset.id) ? 'ring-sky-500' : 'ring-transparent hover:ring-white/20'">
                                            <img x-show="asset.mime_type.startsWith('image/')" :src="'/api/media/' + asset.id + '/file'" class="w-full h-full object-cover">
                                            <div x-show="asset.mime_type.startsWith('video/')" class="w-full h-full bg-gray-800 flex items-center justify-center">
                                                <svg class="w-4 h-4 text-white/50" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                                            </div>
                                            <div x-show="isMediaSelected(c, asset.id)" class="absolute inset-0 bg-sky-500/20 flex items-center justify-center">
                                                <svg class="w-5 h-5 text-sky-400" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>

                        <!-- Website Card toggle -->
                        <div class="mb-3">
                            <label class="inline-flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" x-model="c._useCard" class="rounded text-sky-500">
                                <span class="text-[11px] text-gray-400">Website Card（リンク付きカード広告）を使用</span>
                            </label>
                        </div>
                        <div x-show="c._useCard" x-cloak class="grid grid-cols-1 md:grid-cols-3 gap-3 p-3 rounded-xl bg-white/[0.02] border border-white/[0.06]">
                            <div>

</div>

        async init() {
            // メディアライブラリを読み込み
            try {
                this.mediaAssets = await api('/api/media');
            } catch {}
        },

        addCampaign() {
            const c = defaultCampaign();
            if (this.projectDefaults) this.applyDefaults(c);
            this.campaigns.push(c);
        },
        removeCampaign(idx) { this.campaigns.splice(idx, 1); },
        duplicateCampaign(idx) {
            const copy = JSON.parse(JSON.stringify(this.campaigns[idx]));
            copy._selectedMedia = [...(this.campaigns[idx]._selectedMedia || [])];
            this.campaigns.splice(idx + 1, 0, copy);
        },

        applyDefaults(c) {
            // Project レベル: funding_instrument_id, conversion_tag_id
            const p = this.projectDefaults;
            if (p) {
                if (p.funding_instrument_id) c.funding_instrument_id = p.funding_instrument_id;
                if (p.conversion_tag_id) c.conversion_tag_id = p.conversion_tag_id;
            }
            // Audience レベル: ターゲティング・予算
            const d = this.audienceDefaults;
            if (d) {
                if (d.default_objective) c.campaign_objective = d.default_objective;
                if (d.default_placements) c.placements = d.default_placements;
                if (d.default_platforms) c.target_platforms = d.default_platforms;
                if (d.default_gender) c.target_gender = d.default_gender;
                if (d.default_age_ranges) c.target_age_ranges = d.default_age_ranges;
                if (d.default_locations) c.target_locations = d.default_locations;
                if (d.default_languages) c.target_languages = d.default_languages;
                if (d.default_daily_budget) c.campaign_daily_budget = d.default_daily_budget;
                if (d.default_bid_amount) c.bid_amount = d.default_bid_amount;
                if (d.default_bid_strategy) c.bid_strategy = d.default_bid_strategy;
                if (d.default_audience_expansion) c.audience_expansion = d.default_audience_expansion;
                // Age range dropdown sync
                this.initCampaignAge(c);
            }
        },

        async loadProjectDefaults() {
            if (!this.projectId) { this.landingPages = []; this.projectAudiences = []; return; }
            this.audienceId = '';
            this.audienceDefaults = null;
            try {
                const [data, lps, audiences] = await Promise.all([
                    api(`/api/projects/${this.projectId}`),
                    api(`/api/projects/${this.projectId}/landing-pages`),
                    api(`/api/projects/${this.projectId}/audiences`),
                ]);
                this.projectDefaults = data;
                this.landingPages = lps;
                this.projectAudiences = audiences;
                this.campaigns.forEach(c => this.applyDefaults(c));
                toast('案件設定を読み込みました');
            } catch (err) { toast(err.message, 'error'); }
        },

        applyAudienceDefaults() {
            if (!this.audienceId) { this.audienceDefaults = null; return; }
            const aud = this.projectAudiences.find(a => a.id == this.audienceId);
            if (!aud) return;
            this.audienceDefaults = aud;
            this.campaigns.forEach(c => this.applyDefaults(c));
            toast(`オーディエンス「${aud.name}」を適用しました`);
        },

        // Media helpers
        isMediaSelected(c, assetId) {
            return (c._selectedMedia || []).some(m => m.id === assetId);
        },
        toggleMedia(c, asset) {
            if (!c._selectedMedia) c._selectedMedia = [];
            const idx = c._selectedMedia.findIndex(m => m.id === asset.id);
            if (idx >= 0) {
                c._selectedMedia.splice(idx, 1);
            } else {
                // Video: max 1, Image: max 4
                if (asset.mime_type.startsWith('video/')) {
                    c._selectedMedia = [asset];
                } else {
                    // Remove any video if selecting images
                    c._selectedMedia = c._selectedMedia.filter(m => !m.mime_type.startsWith('video/'));
                    if (c._selectedMedia.length < 4) {
                        c._selectedMedia.push(asset);
                    } else {
                        toast('画像は最大4枚まで選択できます', 'error');
                    }
                }
            }
        },

        // LP sidebar helpers
        get availableLps() {
            return this.landingPages.filter(lp => !lp.is_used);
        },
        get usedLps() {
            return this.landingPages.filter(lp => lp.is_used);
        },
        async toggleLpUsed(lp) {
            try {
                const updated = await api(`/api/landing-pages/${lp.id}`, 'PUT', { is_used: !lp.is_used });
                const idx = this.landingPages.findIndex(l => l.id === lp.id);
                if (idx >= 0) this.landingPages[idx] = updated;
                toast(updated.is_used ? '使用済みに設定しました' : '使用可能に戻しました');
            } catch (e) { toast(e.message, 'error'); }
        },
        setCardUrl(lp) {
            // Set card URL on the first campaign (or active one)
            if (this.campaigns.length > 0) {
                const c = this.campaigns[0];
                c._useCard = true;
                c.website_card_url = lp.url;
                c.website_card_title = c.website_card_title || (lp.name || '');
                toast((lp.name || lp.url) + ' をカードに設定しました');
                this.showLpSidebar = false;
            }
        },

        // JSON toggle helpers for campaign targeting fields
        isCampaignJsonChecked(c, field, value) {
            const raw = c[field];
            if (!raw) return false;
            try {
                const arr = typeof raw === 'string' ? JSON.parse(raw) : raw;
                return Array.isArray(arr) && arr.includes(value);
            } catch { return false; }
        },
        toggleCampaignJson(c, field, value) {
            let arr = [];
            try {
                const raw = c[field];
                arr = raw ? (typeof raw === 'string' ? JSON.parse(raw) : [...raw]) : [];
            } catch { arr = []; }
            const idx = arr.indexOf(value);
            if (idx >= 0) arr.splice(idx, 1);
            else arr.push(value);
            c[field] = arr.length > 0 ? JSON.stringify(arr) : '';
        },
        updateCampaignAge(c) {
            if (!c._ageMin || !c._ageMax) {
                c.target_age_ranges = '';
                return;
            }
            const key = c._ageMin + '_' + c._ageMax;
            const apiVal = this._ageRangeMap[key];
            c.target_age_ranges = apiVal ? JSON.stringify([apiVal]) : '';
        },
        initCampaignAge(c) {
            const raw = c.target_age_ranges;
            if (!raw) return;
            try {
                const arr = typeof raw === 'string' ? JSON.parse(raw) : raw;
                if (!Array.isArray(arr) || arr.length === 0) return;
                for (const [key, apiVal] of Object.entries(this._ageRangeMap)) {
                    if (apiVal === arr[0]) {
                        const [min, max] = key.split('_');
                        c._ageMin = min;
                        c._ageMax = max;
                        return;
                    }
                }
            } catch {}
        },

        buildPayload() {
            return {
                project_id: parseInt(this.projectId),
                name: this.batchName || `入稿 ${new Date().toLocaleDateString('ja-JP')}`,
                campaigns: this.campaigns.map(c => {
                    const out = { ...c };
                    // Clean up internal fields
                    delete out._postMode;
                    delete out._selectedMedia;
                    delete out._showMediaPicker;
                    delete out._useCard;
                    delete out._ageMin;
                    delete out._ageMax;

                    // Compose mode: set media_asset_ids
                    if ((c._postMode || 'compose') === 'compose') {
                        if (c._selectedMedia && c._selectedMedia.length > 0) {
                            out.media_asset_ids = JSON.stringify(c._selectedMedia.map(m => m.id));
                        }
                        // Clear tweet_ids in compose mode
                        out.tweet_ids = '';
                        // Website Card
                        if (!c._useCard) {
                            out.website_card_title = '';
                            out.website_card_url = '';
                            out.website_card_cta = '';
                        }
                    } else {
                        // Existing tweet ID mode: clear compose fields
                        out.tweet_text = '';
                        out.media_asset_ids = '';
                        out.website_card_title = '';
                        out.website_card_url = '';
                        out.website_card_cta = '';
                    }

                    // tweet_ids: ensure JSON array format
                    if (out.tweet_ids && !out.tweet_ids.startsWith('[')) {
                        const ids = out.tweet_ids.split(',').map(s => s.trim()).filter(Boolean);
                        out.tweet_ids = JSON.stringify(ids);
                    }
                    // datetime-local → ISO 8601
                    if (out.start_time) out.start_time = out.start_time + ':00+09:00';
                    if (out.end_time) out.end_time = out.end_time + ':00+09:00';
                    return out;
                }),
            };
        },

        async submitViaApi() {
            if (!this.projectId) { toast('案件を選択してください', 'error'); return; }
            this.submitting = true;
            this.result = null;
            try {
                const payload = this.buildPayload();
                const batch = await api('/api/submissions', 'POST', payload);
                toast('バッチ作成完了、入稿中...');
                const result = await api(`/api/submissions/${batch.id}/submit`, 'POST');
                this.result = result;
                if (result.status === 'completed') toast('全キャンペーン入稿完了！');
                else if (result.status === 'partial_failure') toast('一部のキャンペーンが失敗しました', 'error');
                else toast('入稿に失敗しました', 'error');
            } catch (err) { toast(err.message, 'error'); }
            this.submitting = false;
        },

        async downloadExcel() {
            if (!this.projectId) { toast('案件を選択してください', 'error'); return; }
            this.submitting = true;
            try {
                const payload = this.buildPayload();
                const batch = await api('/api/submissions', 'POST', payload);
                window.location.href = `/api/submissions/${batch.id}/excel`;
                toast('Excelダウンロードを開始しました');
            } catch (err) { toast(err.message, 'error'); }
            this.submitting = false;
        },

        async uploadToAdsEditor() {
            if (!this.projectId) { toast('案件を選択してください', 'error'); return; }
            if (!confirm('広告エディタにアップロードしますか？')) return;
            this.submitting = true;
            this.uploading = true;
            this.uploadStatus = 'uploading';
            this.uploadError = null;
            try {
                const payload = this.buildPayload();
                const batch = await api('/api/submissions', 'POST', payload);
                this._uploadBatchId = batch.id;
                await api(`/api/browser/upload/${batch.id}`, 'POST');
                toast('アップロードを開始しました...');
                this.submitting = false;
                this.pollUploadStatus();
            } catch (err) {
                if (err.message && err.message.includes('session')) {
                    toast('ブラウザセッションが必要です。API設定からログインしてください。', 'error');
                } else {
                    toast(err.message, 'error');
                }
                this.submitting = false;
                this.uploading = false;
                this.uploadStatus = null;
            }
        },

        pollUploadStatus() {
            if (this._pollInterval) clearInterval(this._pollInterval);
            this._pollInterval = setInterval(async () => {
                if (!this._uploadBatchId) return;
                try {
                    const res = await api(`/api/browser/upload/${this._uploadBatchId}/status`);
                    this.uploadStatus = res.upload_status;
                    this.uploadError = res.upload_error;
                    if (res.upload_status === 'uploaded') {
                        clearInterval(this._pollInterval);
                        toast('広告エディタへのアップロード完了！');
                        this.uploading = false;
                    } else if (res.upload_status === 'upload_failed' || res.upload_status === 'session_expired') {
                        clearInterval(this._pollInterval);
                        toast(res.upload_error || 'アップロード失敗', 'error');
                        this.uploading = false;
                    }
                } catch (err) { /* keep polling */ }
            }, 3000);
        },
    };
}
</script>
{% endblock %}
